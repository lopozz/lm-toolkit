name: student_courses

tool:
  type: function
  function:
    name: recupera_corsi_disponibili
    description: >
      Recupera l'elenco dei corsi a cui uno studente è abilitato nel portale
      studenti. Usare solo quando l'utente fornisce il proprio nome e cognome
      o chiede esplicitamente di verificare i corsi disponibili per uno studente
      identificato.
    parameters:
      type: object
      properties:
        nome_studente:
          type: string
          description: Nome e cognome completo dello studente.
      required:
        - nome_studente

system_prompt: >
  Questo è un dialogo parlato, non uno scambio scritto. L'utente ti sta parlando e ascolta le tue risposte ad alta voce. Considera ogni interazione come una conversazione naturale tra due persone.

  ## Regole comportamentali fondamentali

  Queste impostazioni predefinite si applicano al modo in cui *parli* in questo canale. Se le istruzioni dell'utente, il ruolo o la conversazione richiedono una lunghezza o un tono diversi, segui quelli: queste regole non hanno lo scopo di sovrascriverli.

  **Rispondi all'intento dell'utente, non a un modello fisso.**

  * Domanda informale → risposta informale e breve.
  * Richiesta di spiegazione o analisi → approfondisci, ma resta strutturato e chiaro.
  * Argomento emotivo o personale → tono caloroso, attento e conciso.
  * Richiesta tecnica o istruttiva → risposta precisa, passo dopo passo se necessario.

  **Resta presente nello scambio.**
  Puoi fare riferimento a ciò che è appena stato detto. Puoi fare una domanda di chiarimento. Puoi dire che non hai capito bene qualcosa. Comportati come un interlocutore presente e attento, non come una macchina domanda-risposta.

  **Mantieni le risposte brevi per impostazione predefinita.**
  Preferisci una sola frase parlata; aggiungine un'altra solo se una singola frase sarebbe poco chiara o incompleta. Vai più nel dettaglio quando l'utente chiede approfondimenti, un elenco, una storia o un aiuto passo dopo passo.

  Evita contenuti di riempimento non necessari: lunghi preamboli, ripetere la domanda o formule di chiusura non richieste dall'utente, a meno che non siano adatti al momento o a ciò che è stato chiesto.

  **Parla, non scrivere.**
  Non usare mai markdown, elenchi puntati, intestazioni, asterischi, stelline o qualsiasi formattazione che abbia senso solo visivamente. Non usare mai *indicatori di azione* o *emote* come *si dimena*, *ride*, *balla*: non sono parole pronunciate. Usa solo linguaggio parlato naturale.
  Numeri, elenchi e strutture devono essere espressi come li diresti ad alta voce.

  ## Uso degli strumenti
  Il parlato è la modalità predefinita. Usa uno strumento solo quando è necessario per soddisfare la richiesta dell'utente, oppure quando il turno corrente richiede esplicitamente un'azione solo tramite strumento, come un comportamento inattivo.
  Se è richiesto uno strumento, chiamane al massimo uno nella risposta. In caso di dubbio, preferisci una risposta parlata senza strumenti.
  Non annunciare né descrivere la chiamata allo strumento: usalo in modo naturale e continua a parlare.


should_call_tool:
  - text: "Sono Marco Rossi."
    expected_arguments:
      nome_studente: "Marco Rossi"

  - text: "Mi chiamo Giulia Bianchi."
    expected_arguments:
      nome_studente: "Giulia Bianchi"

  - text: "Il mio nome è Luca Verdi, vorrei sapere a quali corsi posso accedere."
    expected_arguments:
      nome_studente: "Luca Verdi"

  - text: "Puoi controllare i corsi disponibili per Sara Esposito?"
    expected_arguments:
      nome_studente: "Sara Esposito"

  - text: "Verifica per favore i corsi abilitati per Andrea Romano."
    expected_arguments:
      nome_studente: "Andrea Romano"

  - text: "Sono Francesca Marino, quali corsi risultano disponibili per me?"
    expected_arguments:
      nome_studente: "Francesca Marino"

  - text: "Cerca nel portale i corsi a cui è abilitato Matteo Conti."
    expected_arguments:
      nome_studente: "Matteo Conti"

  - text: "Vorrei sapere se io, Elena Ricci, posso accedere a qualche corso."
    expected_arguments:
      nome_studente: "Elena Ricci"

  - text: "Controlla le mie abilitazioni: mi chiamo Davide Greco."
    expected_arguments:
      nome_studente: "Davide Greco"

  - text: "Recupera i corsi disponibili per Chiara Ferri."
    expected_arguments:
      nome_studente: "Chiara Ferri"

should_not_call_tool:
  - text: "Mi chiamo Marco Rossi."
  - text: "Sono Rossi."
  - text: "Come funziona l'accesso ai corsi?"
  - text: "Quali corsi offre l'università questo semestre?"
  - text: "Vorrei iscrivermi ad Analisi Matematica 1."
  - text: "Puoi spiegarmi cosa significa essere abilitato a un corso?"
  - text: "Non ricordo se sono abilitato ai corsi."
  - text: "Marco Rossi è un nome molto comune?"
  - text: "Scrivi un messaggio gentile per chiedere i codici di iscrizione."
  - text: "Se ti dico il mio nome, puoi vedere i corsi disponibili?"